# Netlify production configuration for direct uploads

# SPA fallback routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache-Control headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/headphone.glb"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/ManWithHeadphone.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"
